<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"><title>SmartVault Redirect</title>
<script>
var params = window.location.search;
window.location.href = "smartvault://plaid-callback" + params;
setTimeout(function() {
    document.getElementById("msg").innerHTML = 
        "<h2>Redirecting to SmartVault...</h2>" +
        "<p>If the app didn't open, please go back to SmartVault and try again.</p>";
}, 2000);
</script>
</head>
<body>
<div id="msg" style="text-align:center;margin-top:100px;font-family:sans-serif;">
<p>Redirecting back to SmartVault...</p>
</div>
</body>
</html>
